	<script>
		 document.addEventListener('DOMContentLoaded', function() {
		var r_l = document.getElementById("resource_list");
	
		for(let i=0;i<resource.length;i++){

			// 创建最外层的div元素
var outerDiv = document.createElement('div');
outerDiv.className = 'row pt-5 mb-5';

// 创建内层的div元素
var innerDiv = document.createElement('div');
innerDiv.className = 'col-12 col-md-10 col-xl-10';

// 创建card元素
var card = document.createElement('div');
card.className = 'card rounded border-10 shadow-lg mb-12';

// 创建card-body元素
var cardBody = document.createElement('div');
cardBody.className = 'card-body p-4';

// 创建标题元素
var title = document.createElement('h5');
title.className = 'card-title';
var icon = document.createElement('i');
icon.className = 'far fa-chart-bar mr-2 mr-lg-3 text-primary fa-lg fa-fw';
title.appendChild(icon);
title.innerHTML += resource[i].title;

// 创建段落元素
var paragraph = document.createElement('p');
paragraph.className = 'card-text';
paragraph.textContent = resource[i].description;
// 创建链接元素
var link = document.createElement('a');
link.href = resource[i].url;
link.target = '_blank';
link.textContent = '去阅读';
var moreArrow = document.createElement('span');
moreArrow.className = 'more-arrow';
moreArrow.textContent = '→';
link.appendChild(moreArrow);

// 将段落和链接添加到card-body中
cardBody.appendChild(title);
cardBody.appendChild(paragraph);
cardBody.appendChild(link);

// 将card-body添加到card中
card.appendChild(cardBody);

// 将内层div添加到外层div中
innerDiv.appendChild(card);

// 将内层div添加到最外层div中
outerDiv.appendChild(innerDiv);

r_l.appendChild(outerDiv);

		}

	});
	</script>
